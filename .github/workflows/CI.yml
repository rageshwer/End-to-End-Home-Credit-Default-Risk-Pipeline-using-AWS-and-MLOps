name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  smoke-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Application FE Test
        run: |
          pytest tests/test_application.py -v

      - name: Run Bureau Balance FE Test
        run: |
          pytest tests/test_bureau_bal_fe.py -v

      - name: Run Bureau FE Test
        run: |
          pytest tests/test_bureau_fe.py -v

      - name: Run Final Train Matrix Test
        run: |
          pytest tests/test_final_matrix.py -v

      - name: Run Training Test
        run: |
          pytest tests/test_training.py -v

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: home-credit-model-artifacts
          path: artifacts/