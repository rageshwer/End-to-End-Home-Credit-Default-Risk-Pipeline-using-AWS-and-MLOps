name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ]
    # Triggers the workflow only when files change in these specific directories
    paths:
      - 'frontend/**'
      - 'api/**'

env:
  AWS_REGION: ap-south-1                            
  ECR_REPOSITORY: home-credit-registry              

jobs:
  # --------------------------------------------------------
  # JOB 1: Build & Push Frontend (Only if frontend/ changed)
  # --------------------------------------------------------
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2 

    - name: Check for Frontend Changes
      id: check_files
      run: |
        # Checks if any changed file starts with 'frontend/'
        if git diff --name-only HEAD~1 | grep -q '^frontend/'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Configure AWS Credentials
      if: steps.check_files.outputs.changed == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      if: steps.check_files.outputs.changed == 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Frontend Image
      if: steps.check_files.outputs.changed == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: prod_ui
      run: |
        docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f frontend/Dockerfile ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        

  # --------------------------------------------------------
  # JOB 2: Build & Push API (Only if api/ changed)
  # --------------------------------------------------------
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Check for API Changes
      id: check_files
      run: |
        # Checks if any changed file starts with 'api/'
        if git diff --name-only HEAD~1 | grep -q '^api/'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Configure AWS Credentials
      if: steps.check_files.outputs.changed == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      if: steps.check_files.outputs.changed == 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push API Image
      if: steps.check_files.outputs.changed == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: prod_api
      run: |
        docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f api/Dockerfile ./api
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG